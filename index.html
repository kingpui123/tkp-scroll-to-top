<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll to Top Button</title>
    <style>
        /* Transparent html/body ensures the iframe doesn't block out your Google Site */
        html, body {
            margin: 0;
            padding: 0;
            background: transparent;
            overflow: hidden; 
            width: 100%;
            height: 100%;
        }

        #scrollToTopBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            background-color: #333333; /* Change this hex code to match your site color */
            color: white;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 15px;
            border-radius: 50%;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
            transition: opacity 0.3s, transform 0.3s;
            
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
        }

        #scrollToTopBtn:hover {
            background-color: #555555;
            transform: scale(1.1);
        }

        .arrow {
            border: solid white;
            border-width: 0 3px 3px 0;
            display: inline-block;
            padding: 4px;
            transform: rotate(-135deg);
            -webkit-transform: rotate(-135deg);
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <button id="scrollToTopBtn" title="Go to top" onclick="scrollToTop()">
        <i class="arrow"></i>
    </button>

    <script>
        function scrollToTop() {
            // Tells the parent window (your Google Site) to scroll to the top
            window.parent.postMessage('scrollToTop', '*');
        }
    </script>

</body>
</html>
